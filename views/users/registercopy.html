<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse</title>
  <link href="..\..\assets\css\bootstrap.css" rel="stylesheet">
  <link rel="stylesheet" href="..\..\assets\css\style.css">
</head>

<body>
  <nav class="navbar navbar-expand px-4 nav-fija transparente-claro">
    <a class="navbar-brand fw-bold" href="..\home\indexcopy.html">
      <img src="..\..\assets\img\logo.jpg" alt="logo" class="logo" />
    </a>
  </nav>

  <div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh; margin-bottom: 0;">
    <div class="card p-4 shadow-sm w-100 transparente-oscuro" style="max-width: 50%; min-height: 60vh; margin-top: 0%;">
      <h2 class="text-center mb-4">Bienvenido, crea tu cuenta!</h2>
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">Usuario</label>
          <input type="text" class="form-control" id="username" placeholder="@Ejemplo" />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="Ejemplo@Ejemplo.Ejemplo" />
        </div>
        <div class="mb-3">
          <label for="name" class="form-label">Nombre</label>
          <input type="text" class="form-control" id="name" placeholder="Ejemplo" />
          <label for="lasname" class="form-label">Apellido</label>
          <input type="text" class="form-control" id="lasname" placeholder="Ejemplo" />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" />
        </div>
        <a href="logincopy.html" type="submit" class="btn btn-primary w-100">Registrarse</a>
      </form>
      <p class="text-center mt-3">¿Ya tienes una cuenta? <a href="logincopy.html">Inicia Sesión</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
